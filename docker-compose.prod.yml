services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fsrs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fsrs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fsrs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: fsrs-backend:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fsrs}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-fsrs}?sslmode=${DATABASE_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      TRUST_PROXY_HEADERS: "true"
      APP_BASE_URL: ${APP_BASE_URL:-https://fsrs.ziyang.li}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ENV: production
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: fsrs-frontend:latest
    restart: unless-stopped

  # Shared VM edge: this is the only production container that binds host 80/443.
  # Keep ./nginx.conf as the combined edge config for fsrs, store, and randompick.
  # The other apps join the external shared-edge network and expose aliases there.
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      default: {}
      edge: {}
    restart: unless-stopped

networks:
  edge:
    name: shared-edge
    external: true

volumes:
  pgdata:
